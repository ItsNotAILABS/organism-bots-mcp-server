<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">NOVA Organism Bots MCP Platform</title>
  <desc id="desc">Architecture diagram for the NOVA Organism Bots MCP platform showing MCP core, organism bots, proof gates, registry, and external tool surfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7f9fc"/><stop offset="1" stop-color="#eef4f8"/></linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#17324d" flood-opacity="0.14"/></filter>
    <style>.title{font:700 42px Inter,Arial,sans-serif;fill:#132238}.sub{font:500 18px Inter,Arial,sans-serif;fill:#53657a}.label{font:700 18px Inter,Arial,sans-serif;fill:#132238}.body{font:500 14px Inter,Arial,sans-serif;fill:#53657a}.small{font:600 12px Inter,Arial,sans-serif;fill:#53657a;letter-spacing:.3px}.card{fill:#fff;stroke:#d6e1ea;stroke-width:1.5;rx:18;filter:url(#soft)}.core{fill:#10263f;rx:24;filter:url(#soft)}.coreText{font:800 26px Inter,Arial,sans-serif;fill:#fff}.coreSub{font:500 14px Inter,Arial,sans-serif;fill:#c7d7e8}.line{stroke:#7391aa;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-dasharray:7 9}.solid{stroke:#2f6f9f;stroke-width:2.5;fill:none;stroke-linecap:round}.pill{fill:#e9f5ff;stroke:#bdd8ef;stroke-width:1;rx:14}</style>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="70" y="82" class="title">NOVA Organism Bots MCP Platform</text>
  <text x="72" y="116" class="sub">Governed agent organisms with registry, proof gates, runnable MCP contracts, and launch-ready operator surfaces.</text>
  <rect x="440" y="265" width="320" height="190" class="core"/>
  <text x="600" y="326" text-anchor="middle" class="coreText">MCP Core</text>
  <text x="600" y="356" text-anchor="middle" class="coreSub">tools • resources • prompts • tasks</text>
  <text x="600" y="386" text-anchor="middle" class="coreSub">registry loader + proof router</text>
  <rect x="507" y="408" width="186" height="28" class="pill"/>
  <text x="600" y="427" text-anchor="middle" class="small">TRANSITUS BOUNDARY</text>
  <path d="M440 354 C360 354 332 226 245 226" class="solid"/><path d="M760 354 C840 354 868 226 955 226" class="solid"/><path d="M440 384 C350 430 330 548 250 548" class="solid"/><path d="M760 384 C850 430 870 548 950 548" class="solid"/><path d="M600 265 C600 220 600 190 600 155" class="line"/><path d="M600 455 C600 505 600 540 600 605" class="line"/>
  <rect x="74" y="160" width="310" height="132" class="card"/><text x="112" y="206" class="label">ORIGO Builder</text><text x="112" y="235" class="body">Generates repo structure, launch packs,</text><text x="112" y="257" class="body">templates, docs, and reproducible builds.</text>
  <rect x="816" y="160" width="310" height="132" class="card"/><text x="854" y="206" class="label">TRANSITUS Connector</text><text x="854" y="235" class="body">Bridges Caffeine, Grok Build, Claude,</text><text x="854" y="257" class="body">Cursor, Antigravity, and local CLIs.</text>
  <rect x="74" y="482" width="310" height="132" class="card"/><text x="112" y="528" class="label">SACE Proof</text><text x="112" y="557" class="body">Creates receipts, health reports, replay</text><text x="112" y="579" class="body">objects, benchmark and audit packets.</text>
  <rect x="816" y="482" width="310" height="132" class="card"/><text x="854" y="528" class="label">MERCATUS Launch</text><text x="854" y="557" class="body">Packages launches, creator profiles,</text><text x="854" y="579" class="body">publish flows, and pricing gates.</text>
  <rect x="438" y="74" width="324" height="104" class="card"/><text x="600" y="118" text-anchor="middle" class="label">Registry Authority</text><text x="600" y="146" text-anchor="middle" class="body">organism-bots.registry.json</text>
  <rect x="438" y="604" width="324" height="104" class="card"/><text x="600" y="648" text-anchor="middle" class="label">Launch Readiness Gate</text><text x="600" y="676" text-anchor="middle" class="body">validate • serve • invoke • report</text>
  <rect x="72" y="680" width="1056" height="36" rx="18" fill="#10263f" opacity="0.96"/><text x="600" y="704" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#fff">House Codex route: Genesis creates • Translatio connects • Substratum runs • SACE proves • Expressio launches • Cura protects</text>
</svg>
